<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — SIG Transporte</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/panel.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h3><i class="bi bi-bus-front-fill"></i> SIG Transporte</h3>
      <p class="subtitulo">Panel de Administración y Supervisión</p>

      <div id="mensaje-error" style="display:none;" class="alerta-error"></div>

      <form id="form-login">
        <div class="form-group">
          <label for="identificador">Número de CI</label>
          <input type="text" id="identificador" name="identificador" placeholder="Ej: 00000001" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-sig" style="width:100%; padding:0.65rem;">Ingresar</button>
      </form>

      <p style="text-align:center; font-size:0.78rem; color:#95a5a6; margin-top:1.2rem;">
        Solo personal autorizado (Admin / Autoridad).<br>
        El acceso de choferes y pasajeros es desde la app móvil.
      </p>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/common.js') }}"></script>
  <script>
    document.getElementById("form-login").addEventListener("submit", async (e) => {
      e.preventDefault();
      const identificador = document.getElementById("identificador").value.trim();
      const password = document.getElementById("password").value;
      const errorBox = document.getElementById("mensaje-error");
      errorBox.style.display = "none";

      try {
        const resp = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ identificador, password }),
        });
        const data = await resp.json();

        if (!data.ok) {
          errorBox.textContent = data.mensaje || "Error al iniciar sesión";
          errorBox.style.display = "block";
          return;
        }

        const usuario = data.data.usuario;
        if (usuario.rol !== "admin" && usuario.rol !== "autoridad") {
          errorBox.textContent = "Este panel es solo para Admin y Autoridad. Usa la app móvil.";
          errorBox.style.display = "block";
          return;
        }

        guardarSesion(data.data.access_token, data.data.refresh_token, usuario);
        window.location.href = "/dashboard";

      } catch (err) {
        errorBox.textContent = "No se pudo conectar con el servidor.";
        errorBox.style.display = "block";
      }
    });
  </script>
</body>
</html>
